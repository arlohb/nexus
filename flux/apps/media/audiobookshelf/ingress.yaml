apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: cert-audiobookshelf
  namespace: default
spec:
  secretName: cert-audiobookshelf
  dnsNames:
    - abs.arlodev.co.uk
  issuerRef:
    name: letsencrypt
    kind: ClusterIssuer
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: audiobookshelf-local
  namespace: default
spec:
  entryPoints:
    - local
  routes:
    - match: Host(`abs.home`)
      kind: Rule
      services:
        - name: audiobookshelf
          port: 80
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: audiobookshelf-web
  namespace: default
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`abs.arlodev.co.uk`)
      kind: Rule
      services:
        - name: audiobookshelf
          port: 80
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: audiobookshelf-websecure
  namespace: default
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`abs.arlodev.co.uk`)
      kind: Rule
      services:
        - name: audiobookshelf
          port: 80
  tls:
    secretName: cert-audiobookshelf
