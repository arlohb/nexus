apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: nodered
  namespace: default
  annotations:
    kubernetes.io/ingress.class: traefik
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`nodered.home`)
      kind: Rule
      services:
        - name: nodered
          port: 80
    - match: Host(`nodered.arlodev.co.uk`)
      kind: Rule
      services:
        - name: nodered
          port: 80
