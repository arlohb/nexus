apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: vaultwarden
  namespace: default
  annotations:
    kubernetes.io/ingress.class: traefik
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`vault.home`)
      kind: Rule
      services:
        - name: vaultwarden
          port: 80
    - match: Host(`vault.arlodev.co.uk`)
      kind: Rule
      services:
        - name: vaultwarden
          port: 80
