apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: budget
  namespace: default
  annotations:
    kubernetes.io/ingress.class: traefik
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`budget.home`)
      kind: Rule
      services:
        - name: budget
          port: 80
    - match: Host(`budget.arlodev.co.uk`)
      kind: Rule
      services:
        - name: budget
          port: 80
