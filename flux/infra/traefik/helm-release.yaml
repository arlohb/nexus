apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: default
spec:
  interval: 30m
  chart:
    spec:
      chart: traefik
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: default
  values:
    additionalArguments:
      # Disabled for sonarr manual searching
      - --serverstransport.forwardingtimeouts.dialtimeout=0s
      - --serversTransport.forwardingTimeouts.idleConnTimeout=0s
    nodeSelector:
      network: fast
    deployment:
      kind: DaemonSet
    resources:
      requests:
        cpu: 70m
        memory: 204Mi
      limits:
        memory: 204Mi
    service:
      enabled: true
      type: NodePort
      externalTrafficPolicy: Local
    ports:
      # HTTP *.home
      local:
        port: 8000
        targetPort: 8000
        nodePort: 30001
        forwardedHeaders:
          trustedIPs:
            - "10.0.0.0/8"
      # HTTP *.arlodev.co.uk
      web:
        port: 80
        targetPort: 80
        nodePort: 30003
        forwardedHeaders:
          trustedIPs:
            - "10.0.0.0/8"
        http:
          redirections:
            to: websecure
            scheme: https
            permanent: true
          tls:
            enable: false
      # HTTPS *.arlodev.co.uk
      websecure:
        port: 443
        targetPort: 443
        nodePort: 30002
        forwardedHeaders:
          trustedIPs:
            - "10.0.0.0/8"
    providers:
      kubernetesCRD:
        allowExternalNameServices: true
