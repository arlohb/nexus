apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-config
  namespace: default
data:
  openclaw.json: |
    {
      gateway: {
        mode: "local",
        bind: "lan",
        auth: {
          mode: "token",
        },
        controlUi: {
          allowInsecureAuth: true,
          allowedOrigins: [
            "http://oc.home:30001",
          ],
        },
        // Enable the OpenAI-compatible endpoint for use in open-webui
        http: {
          endpoints: {
            chatCompletions: {
              enabled: true,
            },
          },
        },
      },
      // Connect to Ollama
      models: {
        providers: {
          ollama: {
            baseUrl: "http://ollama:11434",
            api: "ollama",
            contextWindow: 524288,
            models: [
              {
                id: "gemma4:e4b",
                name: "gemma4:e4b",
                params: {
                  num_ctx: 524288,
                },
              },
            ],
          },
        },
      },
      agents: {
        defaults: {
          workspace: "~/.openclaw/workspace",
          model: {
            primary: "ollama/gemma4:e4b",
          },
        },
      },
    }
