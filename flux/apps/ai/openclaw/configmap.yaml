apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-config
  namespace: default
data:
  openclaw.json: |
    {
      gateway: {
        mode: "local",
        auth: {
          mode: "token",
        },
        // Enable the OpenAI-compatible endpoint for use in open-webui
        http: {
          endpoints: {
            chatCompletions: {
              enabled: true,
            },
          },
        },
      }
    }
