apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: default
spec:
  interval: 30m
  chart:
    spec:
      chart: traefik
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: default
  values:
    nodeSelector:
      network: fast
    service:
      enabled: true
      type: NodePort
    ports:
      web:
        port: 80
        targetPort: 80
        nodePort: 30001
      websecure:
        port: 443
        targetPort: 443
        nodePort: 30002
    providers:
      kubernetesCRD:
        allowExternalNameServices: true
    entryPoints:
      web:
        forwardedHeaders:
          trustedIPs:
            - "10.0.0.0/8"
