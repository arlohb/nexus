apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: test-server
  namespace: default
spec:
  selector:
    matchLabels:
      app: test-server
  template:
    metadata:
      labels:
        app: test-server
    spec:
      containers:
        - name: test-server
          image: python:3-alpine
          command:
          - /bin/sh
          - -c
          - |
            python3 - <<'EOF'
            from http.server import BaseHTTPRequestHandler, HTTPServer

            class EchoHandler(BaseHTTPRequestHandler):
                def do_ANY(self):
                    content_length = int(self.headers.get('Content-Length', 0))
                    body = self.rfile.read(content_length) if content_length else b""

                    lines = [f"{self.command} {self.path} {self.request_version}"]
                    for k, v in self.headers.items():
                        lines.append(f"{k}: {v}")
                    lines.append("")
                    lines.append(body.decode('utf-8', errors='replace'))
                    response_text = "\r\n".join(lines)

                    self.send_response(200)
                    self.send_header("Content-Type", "text/plain; charset=utf-8")
                    self.send_header("Content-Length", str(len(response_text.encode())))
                    self.end_headers()
                    self.wfile.write(response_text.encode())

                do_GET = do_POST = do_PUT = do_DELETE = do_PATCH = do_ANY

            if __name__ == "__main__":
                port = 8080
                print(f"Starting echo server on port {port}")
                server = HTTPServer(("0.0.0.0", port), EchoHandler)
                server.serve_forever()
            EOF
          ports:
            - containerPort: 8080
