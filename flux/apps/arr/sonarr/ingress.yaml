apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: sonarr
  namespace: default
  annotations:
    kubernetes.io/ingress.class: traefik
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`sonarr.home`)
      kind: Rule
      services:
        - name: sonarr
          port: 80
    - match: Host(`sonarr.arlodev.co.uk`)
      kind: Rule
      services:
        - name: sonarr
          port: 80
