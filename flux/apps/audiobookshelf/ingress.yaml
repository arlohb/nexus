apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: audiobookshelf-ingressroute
  namespace: default
  annotations:
    kubernetes.io/ingress.class: traefik
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`abs.home`)
      kind: Rule
      services:
        - name: audiobookshelf
          port: 80
    - match: Host(`abs.arlodev.co.uk`)
      kind: Rule
      services:
        - name: audiobookshelf
          port: 80
