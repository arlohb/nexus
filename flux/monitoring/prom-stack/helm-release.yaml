apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: default
spec:
  interval: 30m
  chart:
    spec:
      chart: kube-prometheus-stack
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: default
  values:
    grafana:
      enabled: true
      adminPassword: "changeme"
      service:
        type: ClusterIP
      persistence:
        enabled: true
        type: pvc
        selector:
          matchLabels:
            app: grafana
        size: 20Gi
        storageClassName: ""
        accessModes:
          - ReadWriteOnce
        finalizers:
          - kubernetes.io/pvc-protection
    prometheus:
      prometheusSpec:
        serviceMonitorSelectorNilUsesHelmValues: false
        storageSpec:
          volumeClaimTemplate:
            spec:
              selector:
                matchLabels:
                  app: prometheus
              resources:
                requests:
                  storage: 20Gi
              storageClassName: ""
              accessModes:
                - ReadWriteOnce
