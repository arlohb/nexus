apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres15
  namespace: default
spec:
  selector:
    matchLabels:
      app: postgres15
  replicas: 1
  revisionHistoryLimit: 2
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: postgres15
    spec:
      nodeSelector:
        db: "true"
      tolerations:
        - key: db
          operator: Equal
          value: "true"
          effect: NoSchedule
      containers:
        - name: postgres15
          image: postgres:15.17
          resources:
            requests:
              cpu: 33m
              memory: 430Mi
            limits:
              # memory: 430Mi
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: password
            - name: POSTGRES_DB
              value: postgres
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-data
          hostPath:
            path: /export/Root/Volumes/postgres15
