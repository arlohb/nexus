apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: homeassistant
  namespace: default
  annotations:
    kubernetes.io/ingress.class: traefik
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`ha.home`)
      kind: Rule
      services:
        - name: homeassistant
          port: 80
    - match: Host(`ha.arlodev.co.uk`)
      kind: Rule
      services:
        - name: homeassistant
          port: 80
