apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: default
spec:
  interval: 30m
  chart:
    spec:
      chart: kube-prometheus-stack
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: default
  values:
    grafana:
      enabled: true
      adminPassword: "changeme"
      service:
        type: ClusterIP
      persistence:
        enabled: true
        type: pvc
        volumeName: grafana-pv
        size: 20Gi
        storageClassName: null
        selectorLabels:
          app: grafana
        accessModes:
          - ReadWriteOnce
        finalizers:
          - kubernetes.io/pvc-protection
      grafana.ini:
        security:
          allow_embedding: true
          cookie_samesite: disabled
          cors_allow_credentials: true
          cors_allowed_origins: https://ha.arlodev.co.uk
        auth.anonymous:
          enabled: true
          org_name: Main Org
          org_role: Viewer
        auth.service_account:
          enabled: true
    prometheus:
      prometheusSpec:
        serviceMonitorSelectorNilUsesHelmValues: false
        storageSpec:
          volumeClaimTemplate:
            spec:
              selector:
                matchLabels:
                  app: prometheus
              resources:
                requests:
                  storage: 20Gi
              storageClassName: ""
              accessModes:
                - ReadWriteOnce
