apiVersion: apps/v1
kind: Deployment
metadata:
  name: open-webui
  namespace: default
spec:
  selector:
    matchLabels:
      app: open-webui
  replicas: 1
  revisionHistoryLimit: 2
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: open-webui
    spec:
      containers:
        - name: open-webui
          image: openwebui/open-webui:0.9.6
          resources:
            requests:
              cpu: 10m
              memory: 100Mi
            limits:
              # memory: 100Mi
          env:
            # Postgres
            - name: DATABASE_TYPE
              value: postgresql
            - name: DATABASE_HOST
              value: postgres
            - name: DATABASE_PORT
              value: "5432"
            - name: DATABASE_NAME
              value: openwebui
            - name: DATABASE_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-open-webui-secret
                  key: user
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-open-webui-secret
                  key: password
            # Redis
            - name: REDIS_URL
              value: redis://valkey:6379/0
            - name: WEBSOCKET_MANAGER
              value: redis
            - name: ENABLE_WEBSOCKET_SUPPORT
              value: "true"
            # Postgres vector DB
            # Other fields default to the values for database
            - name: VECTOR_DB
              value: pgvector
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: open-webui-data
              mountPath: /app/backend/data
      volumes:
        - name: open-webui-data
          nfs:
            server: datasphere
            path: /Root/Volumes/open-webui
