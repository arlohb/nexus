apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: default
spec:
  interval: 30m
  chart:
    spec:
      chart: traefik
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: default
      interval: 30m
  values:
    service:
      enabled: true
      type: NodePort
      ports:
        web:
          port: 80
          targetPort: 80
          nodePort: 8080
        websecure:
          port: 443
          targetPort: 443
          nodePort: 8443
