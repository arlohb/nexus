apiVersion: apps/v1
kind: Deployment
metadata:
  name: open-terminal
  namespace: default
spec:
  selector:
    matchLabels:
      app: open-terminal
  replicas: 1
  revisionHistoryLimit: 2
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: open-terminal
    spec:
      containers:
        - name: open-terminal
          image: ghcr.io/open-webui/open-terminal:0.11.34
          resources:
            requests:
              cpu: 10m
              memory: 100Mi
            limits:
              # memory: 100Mi
          env:
            - name: OPEN_TERMINAL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: open-terminal-secret
                  key: apikey
          ports:
            - containerPort: 8000
          volumeMounts:
            - name: open-terminal-data
              mountPath: /home/user
      volumes:
        - name: open-terminal-data
          nfs:
            server: datasphere
            path: /Root/Volumes/open-terminal
