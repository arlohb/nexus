apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: bazarr
  namespace: default
  annotations:
    kubernetes.io/ingress.class: traefik
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`bazarr.home`)
      kind: Rule
      services:
        - name: bazarr
          port: 80
    - match: Host(`bazarr.arlodev.co.uk`)
      kind: Rule
      services:
        - name: bazarr
          port: 80
