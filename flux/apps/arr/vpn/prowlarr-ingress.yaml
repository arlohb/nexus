apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: cert-prowlarr
  namespace: default
spec:
  secretName: cert-prowlarr
  dnsNames:
    - prowlarr.arlodev.co.uk
  issuerRef:
    name: letsencrypt
    kind: ClusterIssuer
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: prowlarr-local
  namespace: default
spec:
  entryPoints:
    - local
  routes:
    - match: Host(`prowlarr.home`)
      kind: Rule
      services:
        - name: prowlarr
          port: 80
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: prowlarr-web
  namespace: default
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`prowlarr.arlodev.co.uk`)
      kind: Rule
      services:
        - name: prowlarr
          port: 80
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: prowlarr-websecure
  namespace: default
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`prowlarr.arlodev.co.uk`)
      kind: Rule
      services:
        - name: prowlarr
          port: 80
  tls:
    secretName: cert-prowlarr
