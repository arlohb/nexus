apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: jellyfin
  namespace: default
  annotations:
    kubernetes.io/ingress.class: traefik
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`jellyfin.home`)
      kind: Rule
      services:
        - name: jellyfin
          port: 80
    - match: Host(`jellyfin.arlodev.co.uk`)
      kind: Rule
      services:
        - name: jellyfin
          port: 80
