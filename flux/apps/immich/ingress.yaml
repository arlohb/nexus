apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: immich
  namespace: default
  annotations:
    kubernetes.io/ingress.class: traefik
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`photos.home`)
      kind: Rule
      services:
        - name: immich
          port: 80
    - match: Host(`photos.arlodev.co.uk`)
      kind: Rule
      services:
        - name: immich
          port: 80
