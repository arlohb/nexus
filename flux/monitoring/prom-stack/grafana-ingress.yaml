apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: grafana
  namespace: default
  annotations:
    kubernetes.io/ingress.class: traefik
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`grafana.home`)
      kind: Rule
      services:
        - name: kube-prometheus-stack-grafana
          port: 80
