apiVersion: apps/v1
kind: Deployment
metadata:
  name: immich
  namespace: default
spec:
  selector:
    matchLabels:
      app: immich
  replicas: 1
  revisionHistoryLimit: 2
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: immich
    spec:
      nodeSelector:
        network: fast
      containers:
        - name: immich
          image: ghcr.io/immich-app/immich-server:v2.5.5
          resources:
            requests:
              cpu: 29m
              memory: 1033Mi
            limits:
              memory: 1033Mi
          ports:
            - containerPort: 2283
          env:
            - name: TZ
              value: Europe/London
            - name: IMMICH_PORT
              value: "2283"
            - name: DB_HOSTNAME
              value: postgres
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: user
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: password
            - name: DB_DATABASE_NAME
              value: immich
            - name: REDIS_HOSTNAME
              value: valkey
          volumeMounts:
            - name: media-photos
              mountPath: /usr/src/app/upload
      volumes:
        - name: media-photos
          nfs:
            server: datasphere
            path: /Root/Photos
