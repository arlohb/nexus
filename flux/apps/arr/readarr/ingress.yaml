apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: readarr
  namespace: default
  annotations:
    kubernetes.io/ingress.class: traefik
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`readarr.home`)
      kind: Rule
      services:
        - name: readarr
          port: 80
    - match: Host(`readarr.arlodev.co.uk`)
      kind: Rule
      services:
        - name: readarr
          port: 80
