apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: prometheus
  namespace: default
  annotations:
    kubernetes.io/ingress.class: traefik
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`prom.home`)
      kind: Rule
      services:
        - name: kube-prometheus-stack-prometheus
          port: 9090
